services:
  postgres:
    image: postgres:alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

  pgweb:
    image: ghcr.io/sosedoff/pgweb:latest
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      - PGWEB_DATABASE_URL=postgres://postgres:postgres@postgres:5432/ecommerce?sslmode=disable
    depends_on:
      - postgres

  postgres-test:
    image: postgres:alpine
    restart: "no"
    profiles:
      - test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_test"]
      interval: 2s
      timeout: 3s
      retries: 5

volumes:
  postgres_data: